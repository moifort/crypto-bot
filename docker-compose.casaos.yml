name: crypto-bot
services:
  crypto-bot:
    cpu_shares: 90
    command: []
    container_name: crypto-bot
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NITRO_KRAKEN_API_KEY=${NITRO_KRAKEN_API_KEY}
      - NITRO_KRAKEN_PRIVATE_KEY=${NITRO_KRAKEN_PRIVATE_KEY}
      - NITRO_API_TOKEN=${NITRO_API_TOKEN}
      - NITRO_GRID_LOWER_PRICE=${NITRO_GRID_LOWER_PRICE:-80000}
      - NITRO_GRID_UPPER_PRICE=${NITRO_GRID_UPPER_PRICE:-100000}
      - NITRO_GRID_LEVELS=${NITRO_GRID_LEVELS:-10}
      - NITRO_ORDER_SIZE_USDC=${NITRO_ORDER_SIZE_USDC:-50}
      - NITRO_SANDBOX_MODE=${NITRO_SANDBOX_MODE:-true}
      - NITRO_SENTRY_DSN=${NITRO_SENTRY_DSN:-}
    hostname: crypto-bot
    image: moifort/crypto-bot:latest
    ports:
      - target: 3000
        published: "3100"
        protocol: tcp
    pull_policy: always
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/crypto-bot
        target: /app/.data
    network_mode: bridge
    privileged: false

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://cdn-icons-png.flaticon.com/512/2021/2021646.png
  index: /
  is_uncontrolled: false
  port_map: "3003"
  scheme: http
  store_app_id: crypto-bot
  title:
    custom: ""
    en_us: crypto-bot
