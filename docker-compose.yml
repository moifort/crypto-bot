services:
  crypto-bot:
    image: moifort/crypto-bot:latest
    container_name: crypto-bot
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      NITRO_KRAKEN_API_KEY: ${NITRO_KRAKEN_API_KEY}
      NITRO_KRAKEN_PRIVATE_KEY: ${NITRO_KRAKEN_PRIVATE_KEY}
      NITRO_API_TOKEN: ${NITRO_API_TOKEN}
      NITRO_GRID_LOWER_PRICE: ${NITRO_GRID_LOWER_PRICE:-80000}
      NITRO_GRID_UPPER_PRICE: ${NITRO_GRID_UPPER_PRICE:-100000}
      NITRO_GRID_LEVELS: ${NITRO_GRID_LEVELS:-10}
      NITRO_ORDER_SIZE_USDC: ${NITRO_ORDER_SIZE_USDC:-50}
      NITRO_SANDBOX_MODE: ${NITRO_SANDBOX_MODE:-true}
      NITRO_POST_ONLY: ${NITRO_POST_ONLY:-false}
      NITRO_GRID_RECENTERING: ${NITRO_GRID_RECENTERING:-false}
      NITRO_VOLATILITY_ENABLED: ${NITRO_VOLATILITY_ENABLED:-false}
      NITRO_ATR_PERIOD: ${NITRO_ATR_PERIOD:-14}
      NITRO_SPACING_MIN_MULTIPLIER: ${NITRO_SPACING_MIN_MULTIPLIER:-0.5}
      NITRO_SPACING_MAX_MULTIPLIER: ${NITRO_SPACING_MAX_MULTIPLIER:-2.0}
      NITRO_STOP_LOSS_PERCENT: ${NITRO_STOP_LOSS_PERCENT:-0}
      NITRO_TAKE_PROFIT_USDC: ${NITRO_TAKE_PROFIT_USDC:-0}
      NITRO_SENTRY_DSN: ${NITRO_SENTRY_DSN:-}
    ports:
      - "3100:3000"
    volumes:
      - ./data:/app/.data
